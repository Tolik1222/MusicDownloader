<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes blobMove { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(-80px, 60px) scale(1.2); } 100% { transform: translate(0px, 0px) scale(1); } }
        .blob { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.25; animation: blobMove 20s infinite ease-in-out; z-index: 0; }
        body { background: #0b0b0d; color: white; min-height: 100vh; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="blob" style="background:#dc2626; top:20%; right:-100px;"></div>
    
    <div class="max-w-7xl mx-auto p-4 md:p-8 relative z-10">
        <nav class="flex gap-8 mb-12 border-b border-zinc-800 pb-4 justify-center">
            <a href="/" class="text-zinc-500 hover:text-white transition-colors">SoundCloud</a>
            <a href="/youtube" class="text-red-600 font-bold border-b-2 border-red-600 pb-4 -mb-4">YouTube</a>
        </nav>

        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-red-600 mb-2 italic">YT DOWNLOADER</h1>
            <form action="/search_yt" method="POST" class="max-w-2xl mx-auto flex gap-2 bg-zinc-900 p-2 rounded-xl mt-8 border border-zinc-800">
                <input type="text" name="query" placeholder="Посилання на відео або назва..." required class="flex-1 bg-transparent p-3 outline-none text-white">
                <button type="submit" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-lg font-bold">Пошук</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for track in tracks %}
            <div class="bg-zinc-900/60 border border-zinc-800 rounded-2xl overflow-hidden p-5">
                <img src="{{ track.thumbnail }}" class="w-full aspect-video object-cover rounded-lg mb-4">
                <h3 class="font-bold truncate">{{ track.title }}</h3>
                <div class="flex gap-2 mt-4">
                    <form action="/download" method="POST" class="flex-1 flex gap-2">
                        <input type="hidden" name="url" value="{{ track.url }}">
                        <input type="hidden" name="title" value="{{ track.title }}">
                        <select name="format" class="bg-zinc-800 text-sm rounded px-2">
                            <option value="mp3">MP3</option>
                            <option value="mp4">MP4</option>
                        </select>
                        <button type="submit" onclick="showLoading(this)" class="flex-1 bg-white text-black text-xs font-bold py-2 rounded">Завантажити</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function showLoading(btn) { btn.innerHTML = "..."; }
    </script>
</body>
</html>
