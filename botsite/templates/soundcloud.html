<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes blobMove { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(80px, -60px) scale(1.2); } 66% { transform: translate(-60px, 40px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .blob { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.35; animation: blobMove 25s infinite ease-in-out; z-index: 0; }
        body { background: #0b0b0d; color: white; min-height: 100vh; font-family: sans-serif; }
        audio::-webkit-media-controls-panel { background-color: rgba(39, 39, 42, 0.9); }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="blob" style="background:#f97316; top:-120px; left:-120px;"></div>
    <div class="blob" style="background:#a855f7; bottom:-150px; right:-120px; animation-delay:6s;"></div>
    
    <div class="max-w-7xl mx-auto p-4 md:p-8 relative z-10">
        <nav class="flex gap-8 mb-12 border-b border-zinc-800 pb-4 justify-center">
            <a href="/" class="text-orange-500 font-bold border-b-2 border-orange-500 pb-4 -mb-4">SoundCloud</a>
            <a href="/youtube" class="text-zinc-500 hover:text-white transition-colors">YouTube</a>
        </nav>

        <div class="text-center mb-12">
            <h1 class="text-5xl font-black text-orange-500 mb-2 italic">SC DOWNLOADER</h1>
            <form action="/search_sc" method="POST" class="max-w-2xl mx-auto flex gap-2 bg-zinc-900 p-2 rounded-xl mt-8 border border-zinc-800">
                <input type="text" name="query" placeholder="Назва треку або посилання..." required class="flex-1 bg-transparent p-3 outline-none text-white">
                <button type="submit" onclick="showLoading(this)" class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-lg font-bold">Знайти</button>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for track in tracks %}
            <div class="bg-zinc-900/60 backdrop-blur-xl border border-zinc-800 rounded-2xl overflow-hidden p-5">
                <img src="{{ track.thumbnail }}" class="w-full aspect-square object-cover rounded-lg mb-4">
                <h3 class="font-bold truncate">{{ track.title }}</h3>
                <p class="text-zinc-500 text-sm mb-4">{{ track.uploader }}</p>
                <audio controls class="w-full h-8 mb-4"><source src="{{ track.audio_url }}"></audio>
                <form action="/download" method="POST">
                    <input type="hidden" name="url" value="{{ track.url }}">
                    <input type="hidden" name="title" value="{{ track.title }}">
                    <button type="submit" onclick="showLoading(this)" class="w-full bg-white text-black font-bold py-2 rounded-lg">Скачати MP3</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function showLoading(btn) { btn.innerHTML = "Обробка..."; btn.style.opacity = 0.5; }
    </script>
</body>
</html>
