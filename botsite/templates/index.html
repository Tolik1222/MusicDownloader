<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        @keyframes blobMove { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(80px, -60px) scale(1.2); } 66% { transform: translate(-60px, 40px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .blob { position: fixed; width: 500px; height: 500px; border-radius: 50%; filter: blur(120px); opacity: 0.35; animation: blobMove 25s infinite ease-in-out; z-index: 0; }
        .noise { position: fixed; inset: 0; pointer-events: none; opacity: 0.05; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
        body { margin: 0; color: white; min-height: 100vh; font-family: sans-serif; background: #0b0b0d; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        audio::-webkit-media-controls-panel { background-color: rgba(39, 39, 42, 0.9); }
    </style>
</head>
<body>
    <div class="blob" style="background:#f97316; top:-120px; left:-120px;"></div>
    <div class="blob" style="background:#a855f7; bottom:-150px; right:-120px; animation-delay:6s;"></div>
    <div class="noise"></div>

    <div class="max-w-7xl mx-auto p-4 md:p-8 relative z-10">
        <div class="flex flex-col items-center mb-12 text-center">
            <h1 class="text-5xl font-black text-orange-500 mb-2 italic">SC DOWNLOADER</h1>
            <p class="text-zinc-500 mb-8">Твій персональний архів музики</p>
            <div class="w-full max-w-2xl p-1 bg-gradient-to-r from-orange-500/20 to-transparent rounded-2xl">
                <form action="/search" method="POST" class="flex gap-2 bg-zinc-900 p-2 rounded-xl">
                    <input type="text" name="query" value="{{ query }}" placeholder="Встав посилання або назву..." required class="flex-1 bg-transparent p-3 outline-none text-white">
                    <button type="submit" onclick="showLoading(this)" class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-lg font-bold transition-all">Знайти</button>
                </form>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="hidden lg:block w-64 shrink-0">
                <div class="sticky top-8 p-4 bg-zinc-900/40 backdrop-blur-xl border border-zinc-700/40 rounded-xl">
                    <h3 class="text-orange-500 font-bold mb-4 uppercase text-[10px] tracking-widest">Нещодавно скачано</h3>
                    <ul class="space-y-3 max-h-[400px] overflow-y-auto custom-scrollbar">
                        {% for item in history %}
                        <li class="text-sm text-zinc-300 truncate border-b border-zinc-700/30 pb-2">🎵 {{ item }}</li>
                        {% else %}
                        <li class="text-xs text-zinc-500 italic text-center">Історія порожня</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>

            <div class="flex-1">
                <div id="tracks-container" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                    {% for track in tracks %}
                    <div class="track-card group bg-zinc-900/40 backdrop-blur-xl border border-zinc-700/50 rounded-2xl overflow-hidden hover:border-orange-500/40 transition-all">
                        <div class="relative aspect-square">
                            <img src="{{ track.thumbnail or '' }}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-zinc-900/80"></div>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-lg line-clamp-1">{{ track.title }}</h3>
                            <p class="text-zinc-400 text-sm mb-4">{{ track.uploader }}</p>
                            <div class="mb-5">
                                <audio controls class="w-full h-8 opacity-70 hover:opacity-100">
                                    <source src="{{ track.audio_url }}" type="audio/mpeg">
                                </audio>
                            </div>
                            <div class="flex items-center justify-between gap-4">
                                <span class="text-xs text-zinc-500">{{ track.duration }}</span>
                                <form action="/download" method="POST" class="flex-1">
                                    <input type="hidden" name="url" value="{{ track.url }}">
                                    <input type="hidden" name="title" value="{{ track.title }}">
                                    <button type="submit" onclick="showLoading(this)" class="w-full bg-zinc-100 hover:bg-white text-black font-bold py-2 rounded-lg text-sm transition-all">Скачати</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                
                {% if tracks %}
                <div id="load-more-container" class="mt-12 text-center">
                    <button id="load-more-btn" onclick="loadMore()" class="bg-zinc-800 hover:bg-zinc-700 text-white font-bold px-12 py-4 rounded-xl border border-zinc-700 transition-all">Показати ще</button>
                </div>
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        let currentOffset = 6;
        const query = "{{ query }}";

        function initHls() {
            document.querySelectorAll('audio').forEach(audio => {
                const source = audio.querySelector('source').src;
                if (source.includes('.m3u8') && Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(source);
                    hls.attachMedia(audio);
                }
            });
        }

        async function loadMore() {
            const btn = document.getElementById('load-more-btn');
            btn.innerText = "Завантаження...";
            btn.disabled = true;
            try {
                const res = await fetch('/search_more', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: query, offset: currentOffset })
                });
                const data = await res.json();
                if (data.tracks.length > 0) {
                    const container = document.getElementById('tracks-container');
                    data.tracks.forEach(t => {
                        const html = `
                        <div class="track-card group bg-zinc-900/40 backdrop-blur-xl border border-zinc-700/50 rounded-2xl overflow-hidden hover:border-orange-500/40 transition-all">
                            <div class="relative aspect-square">
                                <img src="${t.thumbnail || ''}" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-zinc-900/80"></div>
                            </div>
                            <div class="p-5">
                                <h3 class="font-bold text-lg line-clamp-1">${t.title}</h3>
                                <p class="text-zinc-400 text-sm mb-4">${t.uploader}</p>
                                <div class="mb-5"><audio controls class="w-full h-8 opacity-70"><source src="${t.audio_url}" type="audio/mpeg"></audio></div>
                                <div class="flex items-center justify-between gap-4">
                                    <span class="text-xs text-zinc-500">${t.duration}</span>
                                    <form action="/download" method="POST" class="flex-1">
                                        <input type="hidden" name="url" value="${t.url}"><input type="hidden" name="title" value="${t.title}">
                                        <button type="submit" onclick="showLoading(this)" class="w-full bg-zinc-100 font-bold py-2 rounded-lg text-sm">Скачати</button>
                                    </form>
                                </div>
                            </div>
                        </div>`;
                        container.insertAdjacentHTML('beforeend', html);
                    });
                    currentOffset += data.tracks.length;
                    initHls();
                } else { document.getElementById('load-more-container').remove(); }
            } finally {
                btn.innerText = "Показати ще";
                btn.disabled = false;
            }
        }

        function showLoading(button) {
            button.innerHTML = '<div class="animate-spin-custom w-4 h-4 border-2 border-current border-t-transparent rounded-full mx-auto"></div>';
        }

        document.addEventListener('play', e => {
            const audios = document.getElementsByTagName('audio');
            for(let a of audios) { if(a !== e.target) a.pause(); }
        }, true);

        initHls();
    </script>
</body>
</html>
