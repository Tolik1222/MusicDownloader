<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Downloader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse-custom { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .skeleton { background: #1f2937; border-radius: 1.5rem; height: 420px; width: 100%; }
        .blob { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.2; z-index: 0; pointer-events: none; }
        body { background: #0b0b0d; color: white; font-family: ui-sans-serif, system-ui, sans-serif; overflow-x: hidden; }
        
        .nav-link { border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav-active { border-color: #f97316 !important; color: white !important; }
        
        .track-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .track-card:hover { transform: translateY(-4px); border-color: rgba(249, 115, 22, 0.4); }
        .favorite-active { color: #ef4444 !important; filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5)); transform: scale(1.2); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        audio::-webkit-media-controls-panel { background-color: rgba(39, 39, 42, 0.9); }
    </style>
</head>
<body>
    <div class="blob" style="background:#f97316; top:-150px; left:-150px;"></div>
    <div class="blob" style="background:#a855f7; bottom:-150px; right:-150px;"></div>

    <div class="max-w-7xl mx-auto p-4 md:p-8 relative z-10">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black text-orange-500 mb-4 tracking-tighter italic">SC PRO</h1>
            <div class="flex justify-center gap-8 mb-8">
                <button onclick="showSection('search')" id="nav-search" class="nav-link nav-active text-sm uppercase tracking-widest font-bold pb-1">Пошук</button>
                <button onclick="showSection('favorites')" id="nav-favs" class="nav-link text-sm uppercase tracking-widest font-bold text-zinc-500 hover:text-white pb-1">Вибране ❤️</button>
            </div>
            
            <div id="search-bar-container" class="w-full max-w-2xl mx-auto p-1 bg-zinc-900/50 rounded-2xl border border-zinc-800 backdrop-blur-md">
                <form action="/search" method="POST" class="flex gap-2">
                    <input type="text" name="query" value="{{ query }}" placeholder="Назва або посилання..." required class="flex-1 bg-transparent p-4 outline-none text-white">
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 px-8 py-3 rounded-xl font-bold transition-all active:scale-95">Знайти</button>
                </form>
            </div>
        </div>

        <div id="search-section">
            <div id="tracks-container" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                {% for track in tracks %}
                <div class="track-card group bg-zinc-900/40 backdrop-blur-xl border border-zinc-800/50 rounded-3xl overflow-hidden">
                    <div class="relative aspect-square">
                        <img src="{{ track.thumbnail or '' }}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all">
                        
                        <button onclick="toggleFavorite(this)" 
                                data-title="{{ track.title }}"
                                data-url="{{ track.url }}"
                                data-thumb="{{ track.thumbnail }}"
                                data-up="{{ track.uploader }}"
                                data-audio="{{ track.audio_url }}"
                                data-dur="{{ track.duration }}"
                                class="absolute top-4 right-4 p-3 bg-black/60 backdrop-blur-md rounded-full hover:scale-110 transition-all z-20 fav-btn">
                            <span class="pointer-events-none">❤️</span>
                        </button>
                    </div>
                    <div class="p-6">
                        <h3 class="font-bold text-xl truncate mb-1">{{ track.title }}</h3>
                        <p class="text-zinc-500 text-sm mb-6">{{ track.uploader }}</p>
                        
                        <audio controls class="w-full mb-6">
                            <source src="{{ track.audio_url }}" type="audio/mpeg">
                        </audio>

                        <div class="flex items-center justify-between">
                            <span class="text-xs font-mono text-zinc-600">{{ track.duration }}</span>
                            <form action="/download" method="POST">
                                <input type="hidden" name="url" value="{{ track.url }}">
                                <input type="hidden" name="title" value="{{ track.title }}">
                                <button type="submit" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-sm hover:bg-orange-500 hover:text-white transition-all">Скачати</button>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            {% if tracks %}
            <div id="load-more-container" class="mt-16 text-center">
                <button id="load-more-btn" onclick="loadMore()" class="px-12 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl font-bold hover:border-orange-500 transition-all">
                    Показати ще
                </button>
            </div>
            {% endif %}
        </div>

        <div id="favorites-section" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                <h2 class="text-3xl font-bold italic text-orange-500 uppercase tracking-tighter">Твоя колекція</h2>
                <button id="zip-btn" onclick="downloadAllFavorites()" class="hidden bg-orange-500 hover:bg-orange-600 text-white px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
                    📦 Завантажити все ZIP
                </button>
            </div>
            <div id="favorites-container" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </div>
    </div>

    <script>
        let currentOffset = 6;
        const searchQuery = "{{ query }}";

        function showSection(name) {
            document.getElementById('search-section').classList.toggle('hidden', name !== 'search');
            document.getElementById('favorites-section').classList.toggle('hidden', name !== 'favorites');
            
            const navSearch = document.getElementById('nav-search');
            const navFavs = document.getElementById('nav-favs');
            
            if (name === 'search') {
                navSearch.classList.add('nav-active');
                navFavs.classList.remove('nav-active');
            } else {
                navFavs.classList.add('nav-active');
                navSearch.classList.remove('nav-active');
                renderFavorites();
            }
        }

        function toggleFavorite(btn) {
            const track = {
                title: btn.getAttribute('data-title'),
                url: btn.getAttribute('data-url'),
                thumbnail: btn.getAttribute('data-thumb'),
                uploader: btn.getAttribute('data-up'),
                audio_url: btn.getAttribute('data-audio'),
                duration: btn.getAttribute('data-dur')
            };

            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            const index = favs.findIndex(f => f.url === track.url);
            
            if (index === -1) {
                favs.push(track);
                btn.classList.add('favorite-active');
            } else {
                favs.splice(index, 1);
                btn.classList.remove('favorite-active');
            }
            
            localStorage.setItem('favs', JSON.stringify(favs));
            if (!document.getElementById('favorites-section').classList.contains('hidden')) renderFavorites();
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-container');
            const zipBtn = document.getElementById('zip-btn');
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            
            if (favs.length > 0) {
                container.innerHTML = favs.map(t => renderTrackCard(t)).join('');
                zipBtn.classList.remove('hidden');
                initHls();
            } else {
                container.innerHTML = '<p class="col-span-full text-center text-zinc-500 py-20">Тут поки нічого немає ❤️</p>';
                zipBtn.classList.add('hidden');
            }
        }

        function renderTrackCard(t) {
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            const isFav = favs.some(f => f.url === t.url) ? 'favorite-active' : '';
            
            return `
            <div class="track-card group bg-zinc-900/40 backdrop-blur-xl border border-zinc-800/50 rounded-3xl overflow-hidden">
                <div class="relative aspect-square">
                    <img src="${t.thumbnail || ''}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-all">
                    <button onclick="toggleFavorite(this)" 
                            data-title="${t.title}" data-url="${t.url}" data-thumb="${t.thumbnail}" 
                            data-up="${t.uploader}" data-audio="${t.audio_url}" data-dur="${t.duration}"
                            class="absolute top-4 right-4 p-3 bg-black/60 backdrop-blur-md rounded-full hover:scale-110 transition-all z-20 fav-btn ${isFav}">
                        <span class="pointer-events-none">❤️</span>
                    </button>
                </div>
                <div class="p-6">
                    <h3 class="font-bold text-xl truncate mb-1">${t.title}</h3>
                    <p class="text-zinc-500 text-sm mb-6">${t.uploader}</p>
                    <audio controls class="w-full mb-6"><source src="${t.audio_url}" type="audio/mpeg"></audio>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-mono text-zinc-600">${t.duration}</span>
                        <form action="/download" method="POST">
                            <input type="hidden" name="url" value="${t.url}"><input type="hidden" name="title" value="${t.title}">
                            <button type="submit" class="bg-white text-black px-6 py-2 rounded-xl font-bold text-sm hover:bg-orange-500 hover:text-white transition-all">Скачати</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        async function loadMore() {
            const container = document.getElementById('tracks-container');
            const btn = document.getElementById('load-more-btn');
            let skeletons = '<div class="skeleton animate-pulse-custom"></div>'.repeat(3);
            
            container.insertAdjacentHTML('beforeend', skeletons);
            btn.classList.add('hidden');

            try {
                const res = await fetch('/search_more', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query: searchQuery, offset: currentOffset })
                });
                const data = await res.json();
                document.querySelectorAll('.skeleton').forEach(s => s.remove());

                if (data.tracks.length > 0) {
                    data.tracks.forEach(t => container.insertAdjacentHTML('beforeend', renderTrackCard(t)));
                    currentOffset += data.tracks.length;
                    btn.classList.remove('hidden');
                    initHls();
                } else { btn.remove(); }
            } catch (e) { console.error(e); }
        }

        async function downloadAllFavorites() {
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            const btn = document.getElementById('zip-btn');
            const original = btn.innerHTML;
            btn.innerHTML = "⏳ Пакуємо...";
            btn.disabled = true;

            try {
                const res = await fetch('/download_zip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ urls: favs.map(f => f.url), titles: favs.map(f => f.title) })
                });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url; a.download = "SC_Archive.zip"; a.click();
                }
            } finally {
                btn.innerHTML = original; btn.disabled = false;
            }
        }

        function initHls() {
            document.querySelectorAll('audio').forEach(audio => {
                const source = audio.querySelector('source').src;
                if (source.includes('.m3u8') && Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(source); hls.attachMedia(audio);
                }
            });
        }

        // Авто-ініціалізація стану сердечок при завантаженні сторінки
        window.addEventListener('DOMContentLoaded', () => {
            const favs = JSON.parse(localStorage.getItem('favs') || '[]');
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const url = btn.getAttribute('data-url');
                if (favs.some(f => f.url === url)) btn.classList.add('favorite-active');
            });
            initHls();
        });

        document.addEventListener('play', e => {
            const audios = document.getElementsByTagName('audio');
            for(let a of audios) { if(a !== e.target) a.pause(); }
        }, true);
    </script>
</body>
</html>
